<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engelsk vg1 - Digital læring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #5a7a94;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .boxes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .box {
            background: white;
            border-radius: 12px;
            padding: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 5px solid;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .box-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #1e3a5f;
        }

        .box-description {
            font-size: 0.95rem;
            color: #5a7a94;
            line-height: 1.5;
        }

        .box:nth-child(1) {
            border-left-color: #2c5aa0;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f9 100%);
        }

        .box:nth-child(1) .box-title {
            color: #2c5aa0;
        }

        .box:nth-child(2) {
            border-left-color: #c8102e;
            background: linear-gradient(135deg, #ffffff 0%, #fef5f5 100%);
        }

        .box:nth-child(2) .box-title {
            color: #c8102e;
        }

        .box:nth-child(3) {
            border-left-color: #2c5aa0;
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f9 100%);
        }

        .box:nth-child(3) .box-title {
            color: #2c5aa0;
        }

        .box:nth-child(4) {
            border-left-color: #c8102e;
            background: linear-gradient(135deg, #ffffff 0%, #fef5f5 100%);
        }

        .box:nth-child(4) .box-title {
            color: #c8102e;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .boxes-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .box {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Engelsk vg1</h1>
            <p class="subtitle">Digital læring</p>
        </header>

        <div class="boxes-grid">
            <div class="box">
                <div class="box-title">ReadSmart</div>
                <div class="box-description">Eksamensforberedelse, 100 oppgaver om leseforståelse</div>
            </div>

            <div class="box">
                <div class="box-title">Plutselig vil det dukke opp er her</div>
                <div class="box-description">Klikk her for å utforske andre tema. Legg til beskrivelse av innholdet.</div>
            </div>

        </div>
    </div>
</body>
</html>
