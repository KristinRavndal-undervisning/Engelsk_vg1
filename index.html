<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engelsk vg1</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    .page { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

    /* ---- hero ---- */
    .hero { text-align: center; padding: 2rem 1rem 1.75rem; }

    h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 42px;
      background: linear-gradient(to right, #BF0A30 0%, #002868 10%, #BF0A30 20%, #002868 30%, #BF0A30 40%, #002868 50%, #BF0A30 60%, #002868 70%, #BF0A30 80%, #002868 90%, #BF0A30 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .hero-sub { font-size: 14px; color: #555; }

    /* ---- oppgaveliste ---- */
    .section-label {
      font-size: 11px; font-weight: 600; color: #888;
      letter-spacing: .08em; text-transform: uppercase;
      margin: 2rem 0 10px;
    }

    .task-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    @media (min-width: 768px) { .task-grid { grid-template-columns: 1fr 1fr; } }

    .task-card {
      background: #fff;
      border: 1px solid #e0e4ee;
      border-radius: 0 10px 10px 0;
      padding: 1rem 1.1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background .15s, border-color .15s;
    }
    .task-card:hover { background: #f7f8fc; border-color: #bbc3d8; }
    .task-card.accent-navy { border-left: 4px solid #0a1f6e; }
    .task-card.accent-red  { border-left: 4px solid #C8102E; }
    .task-card.accent-blue { border-left: 4px solid #00247d; }
    .task-card.accent-navy:hover { border-left-color: #0a1f6e; }
    .task-card.accent-red:hover  { border-left-color: #C8102E; }
    .task-card.accent-blue:hover { border-left-color: #00247d; }

    .task-text { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 500; color: #1a1a2e; margin-bottom: 3px; }
    .task-desc  { font-size: 13px; color: #666; line-height: 1.4; }
    .task-arrow { color: #bbb; font-size: 20px; flex-shrink: 0; line-height: 1; }

    /* ---- footer ---- */
    footer {
      text-align: center; margin-top: 2.5rem; color: #999; font-size: 12px;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="hero">
    <h1>Engelsk vg1</h1>
    <p class="hero-sub">Interaktiv læring</p>
  </div>

  <p class="section-label">Oppgaver</p>
  <div class="task-grid" id="taskGrid"></div>

  <footer></footer>

</div>
<script>
  /* ============================================================
     LEGG TIL ELLER ENDRE OPPGAVER HER
     ============================================================
     Hvert objekt har:
       title  – navn på oppgaven
       desc   – kort beskrivelse
       href   – filnavn (IKKE endre etter at undersiden er opprettet)

     Slik legger du til en ny oppgave:
       1. Kopier én linje og lim inn før ];
       2. Gi den neste ledige nummer i href
       3. Endre title og desc
  ============================================================ */
  const tasks = [
    { title: "ReadSmart", desc: "Leseforståelse, eksamenstrening - 100 oppgaver", href: "ReadSmart.html" },
    { title: "Identifiser og endre ufullstendige setninger - klikk", desc: "Tekst om ytringsfrihet", href: "Identifiser-og-endre-ufullstendige-setninger-Ytringsfrihet.html" },
    { title: "Vanskeligere variant: Identifiser og endre ufullstendige setninger - klikk", desc: "Tekst om ytringsfrihet, lengre tekst og avansert språk", href: "Identifiser-og-endre-ufullstendige-setninger-Ytringsfrihet-Avansert.html" },
    { title: "Identifiser og endre ufullstendige setninger - klikk", desc: "Tekst i flere avsnitt om kulturell nysgjerrighet", href: "Identifiser-og-endre-ufullstendige-setninger-KulturellNysgjerrighet.html" },
    { title: "Identifiser og endre ufullstendige setninger - skriv selv", desc: "Tekst om søvn og læring", href: "Identifiser-og-endre-ufullstendige-setninger-skriv-selv-SoevnOgLaering.html" },
    { title: "Identifiser og endre run-on-setninger - klikk", desc: "Tekst i flere avsnitt om bier", href: "Identifiser-og-endre-run-on-setninger-Bier.html" },
    { title: "Identifiser og endre run-on-setninger - skriv selv", desc: "Tekst om influensere", href: "Identifiser-og-endre-run-on-setninger-skriv-selv-Influensere.html" },
    { title: "Sentence Sort Game", desc: "Plasser setningene som glir over skjermen i rett boks. Konkurrer mot deg selv og se hvor mange poeng du klarer å sammle.", href: "SentenceSortGame.html" },
    { title: "Mer innhold på vei..!", desc: "", href: "oppgave-01.html" },
  ];
  /* ============================================================ */

  const accents = ['accent-navy', 'accent-red', 'accent-blue'];

  document.getElementById('taskGrid').innerHTML = tasks.map((t, i) => `
    <a class="task-card ${accents[i % 3]}" href="${t.href}">
      <div class="task-text">
        <p class="task-title">${t.title}</p>
        <p class="task-desc">${t.desc}</p>
      </div>
      <span class="task-arrow">›</span>
    </a>
  `).join('');
</script>
</body>
</html>
